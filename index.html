<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlickWave Music Streaming App</title>
    <!--
      Apply dark class synchronously BEFORE React mounts.
      This prevents the white flash on load and ensures dark: classes
      work immediately without waiting for useEffect.
    -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("flickwave-theme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
